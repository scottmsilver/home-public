function PatioTab({ streamTick }) {
  const [data, setData] = useState(null);
  const [error, setError] = useState(false);
  const [breeze, setBreeze] = useState(null);   // { id, current, anchor } | null
  const [sleepOpen, setSleepOpen] = useState(false);
  const [, forceTick] = useState(0);            // 1s ticker for the countdown chips

  const load = useCallback(() => {
    apiFetch("/api/raw/fans")
      .then((r) => r.json())
      .then((d) => {
        if (d && !d.error && Array.isArray(d.fans)) { setData(d); setError(false); }
        else setError(true);
      })
      .catch(() => { /* 401 redirects via apiFetch; keep last good otherwise */ });
  }, []);

  useEffect(() => { load(); }, [load]);
  useEffect(() => { if (streamTick) load(); }, [streamTick, load]);

  // Tick once a second so the sleep countdown chips update in place.
  useEffect(() => {
    const t = setInterval(() => forceTick((x) => x + 1), 1000);
    return () => clearInterval(t);
  }, []);

  // Raw passthrough command, then reload to reconcile to truth.
  const rawCmd = useCallback((path, body) => {
    apiFetch("/api/raw/fans/cmd", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path, body: body || {} }),
    }).then(() => setTimeout(load, 300)).catch(() => {});
  }, [load]);

  // encodeURIComponent the device id so reserved chars (?, #, /) in an upstream
  // id can't reshape the path (matches the gate image path's encoding).
  const fanCmd = useCallback((id, body) => rawCmd("/api/fans/" + encodeURIComponent(id), body), [rawCmd]);
  const heaterCmd = useCallback((id, body) => rawCmd("/api/heaters/" + encodeURIComponent(id), body), [rawCmd]);
  const allCmd = useCallback((body) => rawCmd("/api/all", body), [rawCmd]);

  if (!data) {
    return (
      <div className="card">
        <div className="card-status">{error ? "Patio backend unavailable." : "Loading patio…"}</div>
      </div>
    );
  }

  const fans = data.fans || [];
  const heaters = data.heaters || [];
  const now = Date.now();
  const deadlineFor = (d) => d.sleepRemaining != null ? now + d.sleepRemaining * 1000 : null;
  const anyArmed = [...fans, ...heaters].some((d) => d.sleepRemaining != null);

  // ── Combo aggregate helpers (fans-app Home tab) ─────────────────
  const fansOnAny = fans.some((f) => f.state && f.state.fanOn);
  const lightsOnAny = fans.some((f) => f.state && f.state.lightOn);
  const heatersOnAny = heaters.some((h) => h.state && h.state.on && (h.state.level ?? 0) > 0);
  const onFans = fans.filter((f) => f.state && f.state.fanOn);
  const sharedSpeed = onFans.length && onFans.every((f) => f.state.fanSpeed === onFans[0].state.fanSpeed)
    ? onFans[0].state.fanSpeed : -1;
  const breezeLv = (f) => f.state.wind ? f.state.windSpeed : 0;
  const sharedBreeze = onFans.length && onFans.every((f) => breezeLv(f) === breezeLv(onFans[0]))
    ? breezeLv(onFans[0]) : -1;
  const avg = (list, get) => list.length
    ? Math.round(list.reduce((a, x) => a + (get(x) || 0), 0) / list.length) : 0;
  const onLights = fans.filter((f) => f.state && f.state.lightOn);
  const lightAvg = avg(onLights, (f) => f.state.lightBrightness);
  const onHeaters = heaters.filter((h) => h.state && h.state.on);
  const heaterAvg = avg(onHeaters, (h) => h.state.level);

  // group status (N of M, Mixed) — fans-app rowStat
  const rowStat = (items, isOn, online, lvl, fmt) => {
    const total = items.length, on = items.filter(isOn), off = items.filter((x) => !online(x)).length;
    let t = "";
    if (!on.length) t = "";
    else if (on.length < total) t = on.length + " of " + total;
    else { const v = on.map(lvl); t = v.every((x) => x === v[0]) ? fmt(v[0]) : "Mixed"; }
    if (off) t = t ? t + " · " + off + " off" : off + " offline";
    return <span className={"ctl-stat" + (off ? " warn" : "")}>{t}</span>;
  };

  // Heaters have no group endpoint — fan out per heater.
  const allHeaters = (body) => heaters.forEach((h) => heaterCmd(h.id, body));

  const pickBreeze = (n) => {
    if (!breeze) return;
    if (breeze.id === "all") allCmd(n > 0 ? { wind: true, windSpeed: n } : { wind: false });
    else fanCmd(breeze.id, n > 0 ? { wind: true, windSpeed: n } : { wind: false });
    setBreeze(null);
  };

  return (
    <React.Fragment>
      {/* ── Combo controls (All Fans / All Lights / All Heaters) ── */}
      <div className="card">
        {/* All Fans */}
        <div className={"ctl" + (fansOnAny ? " on" : "")} style={{ "--c": "var(--cyan)" }}>
          <button className="ctl-icon" aria-label={"all fans " + (fansOnAny ? "on" : "off")}
                  onClick={() => allCmd({ fanOn: !fansOnAny })}>{FAN_SVG}</button>
          {fansOnAny ? (
            <div className="ctl-main">
              <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
                <div className="segc" style={{ flex: 1, minWidth: 0, marginTop: 0 }}>
                  {[1, 2, 3, 4, 5, 6].map((n) => (
                    <button key={n} className={"spd" + (sharedSpeed === n ? " on" : "")}
                            aria-label={"all fans speed " + n}
                            onClick={() => allCmd({ fanOn: true, fanSpeed: n })}>{n}</button>
                  ))}
                </div>
                <button className={"breeze" + (sharedBreeze > 0 ? " on" : "")} aria-label="all fans breeze"
                        onClick={(e) => setBreeze({ id: "all", current: sharedBreeze, anchor: e.currentTarget })}>
                  {WIND_SVG}{sharedBreeze > 0 ? <span>{sharedBreeze}</span> : null}
                </button>
              </div>
            </div>
          ) : <div className="ctl-spacer" />}
          {rowStat(fans, (f) => f.state.fanOn, (f) => f.online, (f) => f.state.fanSpeed, () => "")}
        </div>

        {/* All Lights */}
        <div className={"ctl" + (lightsOnAny ? " on" : "")} style={{ "--c": "var(--amber)" }}>
          <button className="ctl-icon" aria-label={"all lights " + (lightsOnAny ? "on" : "off")}
                  onClick={() => allCmd({ lightOn: !lightsOnAny })}>{BULB_SVG}</button>
          {lightsOnAny ? (
            <div className="ctl-main">
              <PatioSlider value={lightAvg || 1} color="var(--amber)" suffix={false}
                           onInput={(v) => allCmd({ lightOn: true, lightBrightness: v })} />
            </div>
          ) : <div className="ctl-spacer" />}
          {rowStat(fans, (f) => f.state.lightOn, (f) => f.online, (f) => f.state.lightBrightness, (v) => v + "%")}
        </div>

        {/* All Heaters */}
        {heaters.length ? (
          <div className={"ctl" + (heatersOnAny ? " on" : "")} style={{ "--c": "var(--orange)" }}>
            <button className="ctl-icon" aria-label={"all heaters " + (heatersOnAny ? "on" : "off")}
                    onClick={() => allHeaters({ power: !heatersOnAny })}>{HEAT_SVG}</button>
            {heatersOnAny ? (
              <div className="ctl-main">
                <PatioSlider value={heaterAvg || 1} color="var(--orange)" suffix={false}
                             onInput={(v) => allHeaters({ level: v })} />
              </div>
            ) : <div className="ctl-spacer" />}
            {rowStat(heaters, (h) => h.state.on && (h.state.level ?? 0) > 0, (h) => h.online, (h) => h.state.level, (v) => v + "%")}
          </div>
        ) : null}
      </div>

      {/* ── Per-fan cards ── */}
      {fans.map((f) => (
        <FanCard key={f.id} fan={f} deadline={deadlineFor(f)}
                 cmd={(body) => fanCmd(f.id, body)} onBreeze={(id, cur, a) => setBreeze({ id, current: cur, anchor: a })} />
      ))}

      {/* ── Per-heater cards ── */}
      {heaters.map((h) => (
        <HeaterCard key={h.id} heater={h} deadline={deadlineFor(h)} cmd={(body) => heaterCmd(h.id, body)} />
      ))}

      {/* ── Sleep timer + Goodnight ── */}
      <div className="card">
        <div style={{ display: "flex", gap: 10 }}>
          <button className={"pill" + (anyArmed ? " accent" : "")} style={{ flex: 1 }}
                  onClick={() => setSleepOpen(true)}>Sleep Timer{anyArmed ? " (on)" : ""}</button>
          <button className="pill" style={{ flex: 1 }}
                  onClick={() => rawCmd("/api/goodnight", {})}>Goodnight</button>
        </div>
      </div>

      {breeze ? (
        <BreezeMenu current={breeze.current} anchor={breeze.anchor}
                    onPick={pickBreeze} onClose={() => setBreeze(null)} />
      ) : null}

      {sleepOpen ? (
        <div className="ov" onClick={(e) => { if (e.target.classList.contains("ov")) setSleepOpen(false); }}>
          <div className="sheet">
            <div className="sheet-title">{anyArmed ? "Sleep timer running" : "Turn everything off in…"}</div>
            <div className="sheet-sub">Runs, then turns the patio off.</div>
            <div className="sleep-grid">
              {SLEEP_PRESETS.map((p) => (
                <button key={p.minutes} className="sleep-opt"
                        onClick={() => { rawCmd("/api/sleep", { minutes: p.minutes }); setSleepOpen(false); }}>{p.label}</button>
              ))}
            </div>
            <button className="sheet-row" onClick={() => { rawCmd("/api/goodnight", {}); setSleepOpen(false); }}>Goodnight (off now)</button>
            {anyArmed ? (
              <button className="sheet-row danger" onClick={() => { rawCmd("/api/sleep", { minutes: 0 }); setSleepOpen(false); }}>Cancel timer</button>
            ) : null}
            <button className="sheet-row" onClick={() => setSleepOpen(false)}>Done</button>
          </div>
        </div>
      ) : null}
    </React.Fragment>
  );
}

// ── App ────────────────────────────────────────────────────────
const TABS = [
  { id: "home", label: "Home" },
  { id: "gate", label: "Gate" },
  { id: "pool", label: "Pool" },
  { id: "fans", label: "Patio" },
];

// Pure prediction of the partial control fields a payload SHOULD produce,
// keyed by control.kind. Returns {} when there's nothing persistent to predict
// (e.g. a momentary "unlock" pulse). Used by the central optimistic layer.
function predict(control, payload) {
  if (!control || !payload) return {};
  switch (control.kind) {
    case "toggle":
      return { on: !!payload.on };
    case "segmented":
      return { mode: payload.state, on: payload.state !== "off" };
    case "setpoint":
      return { value: payload.setpoint };
    case "speed":
      return "value" in payload
        ? { value: payload.value, on: true }
        : { on: !!payload.on };
    case "slider":
      return "value" in payload
        ? { value: payload.value, on: true }
        : { on: !!payload.on };
    case "modes":
      if ("mode" in payload) return { mode: payload.mode, on: true };
      if ("on" in payload) return { on: !!payload.on };
      return {};
    case "momentary":
    case "tristate":
      if (payload.action === "hold_forever") return { on: true, mode: "forever" };
      if (payload.action === "hold_today") return { on: true, mode: "timed" };
      if (payload.action === "stop") return { on: false, mode: null };
      if (payload.action === "unlock") return {};   // momentary pulse, nothing to persist
      return {};
    default:
      return {};
  }
}

// True when the live control already reflects ALL predicted fields (mode
// compared case-insensitively, null == null). Used to retire optimistic entries.
function matchesPrediction(control, fields) {
  if (!control) return false;
  for (const k in fields) {
    const want = fields[k];
    const got = control[k];
    if (k === "mode") {
      const a = want == null ? null : String(want).toLowerCase();
      const b = got == null ? null : String(got).toLowerCase();
      if (a !== b) return false;
    } else if (k === "on") {
      if (!!want !== !!got) return false;
    } else {
      if (want !== got) return false;
    }
  }
  return true;
}

function App() {
  const [state, setState] = useState({ controls: [] });
  const [sections, setSections] = useState([]);    // [{title, ids:[{domain,id}], snapshot:{key->control}}]
  const [tab, setTab] = useState("home");
  const [connected, setConnected] = useState(false);
  // Bumped on each SSE frame so the faithful Pool tab can re-fetch /api/raw/pool.
  const [streamTick, setStreamTick] = useState(0);
  const draggingRef = useRef(false);
  // Central optimistic overlay: key "domain:id" -> { fields:{...predicted...} }.
  // A tap reflects instantly via these fields; SSE reconciliation (or a 6s
  // safety timer) clears each entry.
  const [optimistic, setOptimistic] = useState({});
  const optimisticTimers = useRef({});             // key -> timeout id
  // Auth gate. "checking" until /api/auth/me resolves; "ok" once we know we may
  // load (LAN open, or remote + signed in). On remote-not-signed-in we redirect
  // to sign-in and stay "checking" (the browser navigates away). Until "ok" we
  // never start the data fetches / SSE, and we render a minimal Loading shell
  // instead of a blank page.
  const [authState, setAuthState] = useState("checking");
  // Top-level "Goodnight" — one tap runs the whole-house bedtime scene: patio
  // fans/lights/heaters off AND spa + pool light + on-auxiliaries off. No
  // confirm; the server fans out per domain and SSE reconciles the UI.
  const goodnight = useCallback(() => {
    apiFetch("/api/goodnight", { method: "POST" })
      .catch(() => { /* 401 redirects via apiFetch; SSE reconciles the rest */ });
  }, []);

  // On mount, resolve the auth challenge before doing anything else.
  // - {authRequired:false}                  → LAN, open → proceed.
  // - {authRequired:true, email:"…"}         → remote, signed in → proceed.
  // - {authRequired:true} without an email   → remote, NOT signed in → redirect.
  // - 401 (handled by apiFetch)              → NOT signed in → redirect.
  useEffect(() => {
    apiFetch("/api/auth/me")
      .then((r) => r.json())
      .then((d) => {
        if (d && d.authRequired && !d.email) {
          redirectToLogin();
          return;
        }
        setAuthState("ok");
      })
      .catch(() => { /* 401 already triggered redirect; stay on Loading */ });
  }, []);

  // Initial paint + learn the Home section structure (titles + control ids/order).
  // Gated on authState === "ok" so we never fetch (and surface a confusing 401)
  // before the auth challenge is resolved.
  useEffect(() => {
    if (authState !== "ok") return;
    apiFetch("/api/state")
      .then((r) => r.json()).then((d) => setState(d)).catch(() => {});
    apiFetch("/api/home")
      .then((r) => r.json())
      .then((d) => {
        // New shape: {sections:[{title, controls:[...]}]}. Fall back to the old
        // flat {controls:[...]} shape by grouping into a single section.
        let secs = d.sections;
        if (!secs) {
          secs = (d.controls && d.controls.length) ? [{ title: "Home", controls: d.controls }] : [];
        }
        setSections(secs.map((s) => {
          const ctrls = s.controls || [];
          const snapshot = {};
          ctrls.forEach((c) => { snapshot[c.domain + ":" + c.id] = c; });
          return {
            title: s.title,
            ids: ctrls.map((c) => ({ domain: c.domain, id: c.id })),
            snapshot,
          };
        }));
      })
      .catch(() => {});
  }, [authState]);

  // Live SSE stream. Also gated on auth; if the stream errors while the document
  // is no longer authenticated (e.g. session expired → 401 on the SSE endpoint),
  // a follow-up /api/state probe surfaces the 401 and redirects to sign-in rather
  // than silently flipping the connection dot off forever.
  useEffect(() => {
    if (authState !== "ok") return;
    let es = null;
    let closed = false;
    const last = { t: Date.now() };   // last time ANY frame (data or ping) arrived
    let lastProbe = 0;                // throttle the onerror auth probe

    const connect = () => {
      if (closed) return;
      es = new EventSource("/api/stream");
      es.onopen = () => { last.t = Date.now(); setConnected(true); };
      es.onmessage = (ev) => {
        last.t = Date.now();
        try {
          const d = JSON.parse(ev.data);
          if (d && d.controls) { setConnected(true); setState(d); setStreamTick((t) => t + 1); }
        } catch (e) { /* ignore malformed frame */ }
      };
      // Server heartbeat (~every 20s): proves the stream is alive even when no
      // state is changing, so the watchdog below can tell "quiet" from "dead".
      es.addEventListener("ping", () => { last.t = Date.now(); setConnected(true); });
      es.onerror = () => {
        setConnected(false);
        // EventSource fires onerror repeatedly during an outage and can't read
        // the HTTP status, so probe a normal endpoint to detect a 401 (session
        // gone → apiFetch redirects to sign-in). Throttle to ≤1 probe / 15s so
        // a long outage with many tabs doesn't fan out into a probe storm.
        const now = Date.now();
        if (now - lastProbe > 15000) {
          lastProbe = now;
          apiFetch("/api/state").catch(() => {});
        }
        // Native EventSource auto-reconnects on transient errors; the watchdog
        // covers the zombie case where onerror never fires.
      };
    };

    const reconnect = () => {
      // Don't churn a connection that's mid-handshake: only tear down one that's
      // actually OPEN-but-stale (zombie) or already CLOSED. A CONNECTING socket
      // is native EventSource retry in progress — let it finish.
      if (es && es.readyState === 0 /* CONNECTING */) return;
      try { if (es) es.close(); } catch (e) { /* already closed */ }
      setConnected(false);
      connect();
    };

    connect();

    // Watchdog: heartbeats land every ~20s. If nothing has arrived in 35s the
    // connection is a zombie (server restarted, tunnel dropped, laptop slept) —
    // tear it down and open a fresh one so optimistic taps reconcile again.
    const watchdog = setInterval(() => {
      if (Date.now() - last.t > 35000) reconnect();
    }, 10000);

    // Reconnect right away when the tab is brought back to the foreground.
    const onVis = () => {
      if (document.visibilityState === "visible" && Date.now() - last.t > 10000) reconnect();
    };
    document.addEventListener("visibilitychange", onVis);

    return () => {
      closed = true;
      clearInterval(watchdog);
      document.removeEventListener("visibilitychange", onVis);
      if (es) es.close();
    };
  }, [authState]);

  // Clear any pending optimistic safety timers on unmount.
  useEffect(() => () => {
    Object.values(optimisticTimers.current).forEach(clearTimeout);
  }, []);

  const command = useCallback((control, payload) => {
    if (control) {
      const key = control.domain + ":" + control.id;
      const fields = predict(control, payload);
      if (fields && Object.keys(fields).length) {
        setOptimistic((o) => ({ ...o, [key]: { fields } }));
        clearTimeout(optimisticTimers.current[key]);
        optimisticTimers.current[key] = setTimeout(() => {
          setOptimistic((o) => {
            if (!(key in o)) return o;
            const next = { ...o };
            delete next[key];
            return next;
          });
          delete optimisticTimers.current[key];
        }, 6000);
      }
      postCommand(control.domain, control.id, payload);
    }
  }, []);

  // Reconcile on each SSE snapshot: drop optimistic entries the live state now
  // satisfies (and cancel their safety timers).
  useEffect(() => {
    setOptimistic((o) => {
      let changed = false;
      const next = { ...o };
      for (const key in o) {
        const live = byKey[key];
        if (live && matchesPrediction(live, o[key].fields)) {
          clearTimeout(optimisticTimers.current[key]);
          delete optimisticTimers.current[key];
          delete next[key];
          changed = true;
        }
      }
      return changed ? next : o;
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [state]);

  // Merge optimistic overlay onto a live control.
  const merge = (c) => {
    if (!c) return c;
    const ov = optimistic[c.domain + ":" + c.id];
    return ov ? { ...c, ...ov.fields } : c;
  };

  // byKey holds the MERGED controls so both home sections and domain tabs see
  // the optimistic overlay.
  const byKey = {};
  (state.controls || []).forEach((c) => {
    byKey[c.domain + ":" + c.id] = merge(c);
  });

  // While the auth check is in flight (or while a sign-in redirect is taking
  // effect) render a minimal centered "Loading…" so the page is never blank.
  if (authState !== "ok") {
    return (
      <div className="app" style={{ display: "flex", alignItems: "center",
           justifyContent: "center", minHeight: "60vh" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10,
             color: "var(--label2)", fontSize: 15 }}>
          <span className="spin" /> Loading…
        </div>
      </div>
    );
  }

  let body;
  if (tab === "home") {
    body = <HomeSections sections={sections} byKey={byKey} command={command} mergeFn={merge} />;
  } else if (tab === "pool") {
    // Faithful pentair Pool tab: renders the real pentair cards from raw state.
    body = <PoolTab streamTick={streamTick} />;
  } else if (tab === "gate") {
    // Faithful unifi-gate Gate tab: renders the real door cards from raw state.
    body = <GateTab streamTick={streamTick} />;
  } else if (tab === "fans") {
    // Faithful fans-app Patio tab: renders the real per-device cards + combo
    // controls from raw GET /api/raw/fans (live via SSE re-fetch).
    body = <PatioTab streamTick={streamTick} />;
  } else {
    const domainControls = (state.controls || [])
      .filter((c) => c.domain === tab)
      .filter((c) => !(c.domain === "gate" && c.id === "gate"))
      .map(merge);
    body = <DomainCard tab={tab} controls={domainControls} command={command} />;
  }

  return (
    <div className="app">
      <div className="hdr">
        <div className="seg">
          {TABS.map((t) => (
            <button key={t.id} className={t.id === tab ? "active" : ""}
                    onClick={() => setTab(t.id)}>{t.label}</button>
          ))}
        </div>
        <div className="hdr-right">
          <button className="moon-btn" aria-label="Goodnight — sleep the patio"
                  title="Goodnight — sleep the patio" onClick={goodnight}>{MOON_SVG}</button>
          <div className={"conn-dot" + (connected ? "" : " off")}
               title={connected ? "Connected" : "Reconnecting…"} />
        </div>
      </div>
      {body}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
}
</script>
</body>
</html>
