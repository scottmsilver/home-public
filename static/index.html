<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Home</title>
<script src="/vendor/tailwind.js"></script>
<script src="/vendor/react.production.min.js"></script>

<style>
:root {
  /* ── Pentair design tokens ─────────────────────────────────────
     Canonical pentair palette (deep navy bg, translucent cards,
     teal/warm accents, slate text). Home's existing token names are
     remapped onto these values so every component picks up the new
     look without markup changes. */
  --bg: #0a1628;
  --card: rgba(255,255,255,0.06);
  --card-border: rgba(255,255,255,0.08);
  --accent: #38bdf8;
  --teal: #2dd4bf;
  --warm: #f97316;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-faint: rgba(255,255,255,0.35);
  --text-bright: #f8fafc;
  /* Home token names mapped onto the pentair palette ───────────── */
  --fill: rgba(255,255,255,0.06);
  --track: rgba(255,255,255,0.12);
  --label: var(--text-bright);
  --label2: var(--text-dim);
  --label3: var(--text-faint);
  --cyan: #2dd4bf;   /* primary active/"on" accent → pentair teal */
  --blue: #38bdf8;   /* secondary accent → pentair sky */
  --amber: #38bdf8;  /* light accent → sky (cohesive with palette) */
  --orange: #f97316; /* heating/warning → pentair warm */
  --green: #2dd4bf;  /* ok/active states → teal */
  --indigo: #38bdf8;
  --red: #ef4444;
  /* unified circular-control diameter (icon buttons, expander, swatches) */
  --circle: 44px;
  /* type scale, applied by role */
  --fs-title: 17px;
  --fs-name: 16px;
  --fs-sub: 13px;
  --fs-btn: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; overflow-y: scroll; scrollbar-gutter: stable; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100%;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
  display: flex; justify-content: center;
}
.app { width: 100%; max-width: 420px; padding: 0 16px calc(28px + env(safe-area-inset-bottom)); }

/* ── Large-title header ─────────────────── */
.hdr {
  display: flex; justify-content: space-between; align-items: flex-end;
  padding: calc(22px + env(safe-area-inset-top)) 4px 16px;
}
.hdr-title {
  font-size: 34px; font-weight: 700; letter-spacing: 0.3px;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
}
.hdr-right { display: flex; align-items: center; gap: 12px; padding-bottom: 5px; }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; transition: background .2s; }
.conn-dot.off { background: #ef4444; }

/* iOS segmented control */
.seg { display: inline-flex; background: var(--fill); border-radius: 11px; padding: 2px; }
.seg button {
  padding: 7px 16px; border: none; background: transparent;
  color: var(--label2); font-size: 14px; font-weight: 600;
  border-radius: 9px; font-family: inherit; cursor: pointer;
  transition: background .18s ease-out, color .18s ease-out;
}
.seg button.active { background: rgba(45,212,191,.18); color: var(--teal); }

/* ── Cards ──────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 12px;
}
.card-title-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; min-height: 22px;
}
.card-title { font-size: var(--fs-title); font-weight: 600; letter-spacing: -.2px; }
.card-status { font-size: var(--fs-sub); color: var(--label2); font-variant-numeric: tabular-nums; }

/* section-card status badge pill (pentair-style) */
.badge {
  font-size: var(--fs-sub); font-weight: 600; letter-spacing: .1px;
  padding: 4px 10px; border-radius: 9px;
  background: rgba(255,255,255,.08); color: var(--text-dim);
  white-space: nowrap; font-variant-numeric: tabular-nums;
}
.badge.green  { background: rgba(45,212,191,.18); color: var(--teal); }
.badge.teal   { background: rgba(56,189,248,.18); color: var(--accent); }
.badge.orange { background: rgba(249,115,22,.18); color: var(--warm); }
.badge.gray   { background: rgba(255,255,255,.08); color: var(--text-dim); }

/* group divider label inside the unified Home card */
.group-label {
  font-size: 12px; font-weight: 700; letter-spacing: .6px;
  color: var(--label2); text-transform: uppercase;
  margin: 4px 0 10px; padding-top: 4px;
}
.group-label.spaced { margin-top: 18px; }

/* ── Control rows ───────────────────────── */
.ctl {
  display: flex; align-items: center; gap: 14px;
  min-height: 44px;
  --c: var(--cyan);
}
.ctl + .ctl { margin-top: 12px; }
.ctl.offline { opacity: .4; }

.ctl-icon {
  width: var(--circle); height: var(--circle); border-radius: 50%; flex-shrink: 0;
  background: var(--fill); border: none; cursor: pointer; padding: 0;
  color: var(--label3);
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
  transition: color .25s ease-out, box-shadow .25s ease-out, transform .12s ease-out;
}
.ctl-icon:active { transform: scale(.9); }
.ctl-icon svg { width: 22px; height: 22px; display: block; }
.ctl.on .ctl-icon {
  color: var(--c);
  box-shadow: inset 0 0 0 1px var(--c), 0 0 14px -3px var(--c);
}
.ctl-icon[disabled] { cursor: default; }

.ctl-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.ctl-name { font-size: var(--fs-name); font-weight: 500; color: var(--label); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ctl-sub { font-size: var(--fs-sub); color: var(--label2); font-variant-numeric: tabular-nums; }
.ctl-sub.warn { color: var(--orange); }

.ctl-right { flex-shrink: 0; display: flex; align-items: center; gap: 8px; }

/* label-less group status (Patio summary rows, fans-app style) */
.ctl-stat { flex-shrink: 0; font-size: var(--fs-sub); font-weight: 600; color: var(--label2); font-variant-numeric: tabular-nums; }
.ctl-stat.warn { color: var(--orange); }
/* subtle card-level offline warning (Patio summary card) */
.card-warn { margin-top: 8px; font-size: var(--fs-sub); font-weight: 500; color: var(--orange); opacity: 0.85; }
.ctl-spacer { flex: 1; min-width: 0; }
.off-badge {
  font-size: 11px; font-weight: 600; color: var(--warm);
  background: rgba(249,115,22,.16); padding: 3px 8px; border-radius: 8px;
}

/* slider */
.slider-wrap { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
input[type=range] {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 30px; background: transparent; cursor: pointer; min-width: 0;
}
input[type=range]::-webkit-slider-runnable-track {
  height: 7px; border-radius: 3.5px;
  background: linear-gradient(to right,
    var(--c) 0%, var(--c) var(--pct,0%), var(--track) var(--pct,0%));
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 26px; height: 26px; border-radius: 50%;
  background: #fff; margin-top: -9.5px;
  box-shadow: 0 2px 7px rgba(0,0,0,.5);
}
input[type=range]::-moz-range-track { height: 7px; border-radius: 3.5px; background: var(--track); }
input[type=range]::-moz-range-progress { height: 7px; border-radius: 3.5px; background: var(--c); }
input[type=range]::-moz-range-thumb {
  width: 26px; height: 26px; border-radius: 50%; border: none;
  background: #fff; box-shadow: 0 2px 7px rgba(0,0,0,.5);
}
.slider-val {
  width: 38px; flex-shrink: 0; text-align: right;
  font-size: 15px; font-weight: 600; color: var(--label2);
  font-variant-numeric: tabular-nums;
}
.ctl.on .slider-val { color: var(--label); }

/* speed pills */
.segc { display: flex; gap: 5px; margin-top: 8px; }
.spd {
  flex: 1; min-width: 0; padding: 9px 6px; border-radius: 12px;
  background: var(--fill); border: none; color: var(--label2);
  font-size: var(--fs-btn); font-weight: 600; font-family: inherit; cursor: pointer;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-variant-numeric: tabular-nums;
  transition: background .15s ease-out, color .15s ease-out, transform .12s ease-out;
}
.spd.on { background: rgba(45,212,191,.22); color: var(--teal); }
.spd:active { transform: scale(.92); }

/* momentary pill button */
.pill {
  flex-shrink: 0;
  padding: 9px 16px; border-radius: 12px;
  background: var(--fill); border: none; cursor: pointer;
  color: var(--label); font-size: var(--fs-btn); font-weight: 600;
  font-family: inherit;
  transition: background .16s ease-out, transform .15s ease-out;
}
.pill:active { transform: scale(.94); }
.pill.accent { background: rgba(45,212,191,.2); color: var(--teal); }
.pill[disabled] { opacity: .5; cursor: default; }
.pill.ghost { background: transparent; box-shadow: inset 0 0 0 1px var(--track); color: var(--label2); padding: 7px 12px; font-size: 13px; }

.spin {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.25); border-top-color: #fff;
  animation: spin .7s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* centered dialog / action sheet */
.ov {
  position: fixed; inset: 0; z-index: 10;
  background: rgba(0,0,0,.5);
  -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
  display: flex; align-items: flex-start; justify-content: center;
  padding: calc(64px + env(safe-area-inset-top)) 16px 16px;
}
.sheet {
  width: 100%; max-width: 404px;
  background: #11203a; border: 1px solid var(--card-border); border-radius: 18px;
  padding: 18px 16px 18px;
}
.sheet-title { font-size: 15px; font-weight: 600; color: var(--label); margin-bottom: 4px; text-align: center; }
.sheet-sub { font-size: 12px; color: var(--label2); margin-bottom: 16px; text-align: center; }
.sheet-row {
  width: 100%; margin-top: 8px; padding: 15px 0; border-radius: 13px;
  background: var(--fill); border: none; font-family: inherit;
  font-size: 16px; font-weight: 500; color: var(--label); cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.sheet-row:active { background: var(--track); }
.sheet-row.danger { color: var(--red); }
.sheet-input {
  background: var(--fill); border: none; border-radius: 11px;
  padding: 11px 12px; color: var(--label); font-size: 16px; font-family: inherit;
  font-variant-numeric: tabular-nums;
}
.sheet-input:focus { outline: 2px solid var(--teal); }

/* modes color picker */
.modes-strip {
  display: flex; gap: 8px; margin-top: 10px;
  overflow-x: auto; padding-bottom: 2px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.modes-strip::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 8px 12px; border-radius: 12px;
  background: var(--fill); border: none; font-family: inherit;
  font-size: 13px; font-weight: 600; color: var(--label);
  cursor: pointer; white-space: nowrap;
  display: flex; align-items: center; gap: 7px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.07);
  transition: background .15s ease-out, box-shadow .15s ease-out, transform .12s ease-out;
}
.chip:active { transform: scale(.93); }
.chip.on { box-shadow: inset 0 0 0 1.5px var(--teal); background: rgba(45,212,191,.16); }
.chip-dot {
  width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.25);
}
.chip .spin { width: 13px; height: 13px; }

/* 3-way segmented switch (segmented / tristate kinds) */
.tri {
  display: flex; gap: 5px; margin-top: 8px;
  background: var(--fill); border-radius: 11px; padding: 3px;
}
.tri button {
  flex: 1; padding: 9px 0; border-radius: 8px;
  background: transparent; border: none; color: var(--label2);
  font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
  transition: background .15s ease-out, color .15s ease-out, transform .12s ease-out;
}
.tri button.on { background: rgba(45,212,191,.18); color: var(--teal); }
.tri button.busy { background: rgba(45,212,191,.25); color: var(--teal); }
.tri button:active { transform: scale(.95); }
.tri button[disabled] { opacity: .5; cursor: default; }

/* unifi-style gate door control: "Open" label + Once / Until / Forever row */
.gate-open-label {
  font-size: 12px; font-weight: 700; letter-spacing: .6px;
  color: var(--label2); text-transform: uppercase; margin: 8px 0 8px;
}
.gate-actions { display: flex; gap: 8px; }
.gate-btn {
  flex: 1; min-width: 0; padding: 9px 10px; border-radius: 12px;
  background: var(--fill); border: none; color: var(--label);
  font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s ease-out, color .15s ease-out, box-shadow .15s ease-out, transform .12s ease-out;
}
.gate-btn:active { transform: scale(.95); }
.gate-btn[disabled] { opacity: .5; cursor: default; }
.gate-btn.held {
  background: rgba(45,212,191,.18); color: var(--teal);
  box-shadow: inset 0 0 0 1px var(--teal);
}
.gate-btn.busy { background: rgba(45,212,191,.25); color: var(--teal); box-shadow: none; }

/* setpoint stepper (inline +/- around a big value) */
.stepper { display: flex; align-items: center; gap: 14px; }
.step-btn {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  background: var(--fill); border: none; cursor: pointer; color: var(--label);
  font-size: 22px; font-weight: 500; line-height: 1; font-family: inherit;
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
  transition: background .15s ease-out, transform .12s ease-out;
}
.step-btn:active { transform: scale(.9); }
.step-btn[disabled] { opacity: .4; cursor: default; }
.step-val {
  min-width: 56px; text-align: center;
  font-size: 22px; font-weight: 600; color: var(--label);
  font-variant-numeric: tabular-nums;
}

/* ── pentair-faithful Spa card ──────────── */
.spa-temp-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
.spa-temp-val {
  font-size: 52px; font-weight: 700; color: var(--label);
  letter-spacing: -2px; line-height: 1.1;
  font-variant-numeric: tabular-nums;
}
.spa-temp-deg { font-weight: 400; opacity: .5; }
.spa-heat-info {
  font-size: var(--fs-sub); color: var(--orange); font-weight: 500;
  margin-top: 4px; margin-bottom: 2px;
}
/* segmented Off / Spa / Jets pills */
.spa-seg { display: flex; gap: 8px; margin-top: 12px; margin-bottom: 4px; }
.spa-seg-btn {
  min-width: 0; padding: 9px 16px; border-radius: 12px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.10);
  color: var(--label2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-size: var(--fs-btn); font-weight: 600; font-family: inherit;
  cursor: pointer; transition: background .2s, color .2s, border-color .2s, transform .12s ease-out;
}
.spa-seg-btn:active { transform: scale(.95); }
.spa-seg-btn.active {
  background: rgba(45,212,191,.18);
  border-color: rgba(45,212,191,.35);
  color: var(--teal);
}
.spa-seg-btn[disabled] { opacity: .5; cursor: default; }
/* tappable setpoint bar */
.spa-set-row {
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 12px; padding: 12px 16px; margin-top: 12px;
  cursor: pointer; transition: background .2s;
}
.spa-set-row:active { background: rgba(255,255,255,.08); }
.spa-set-label { font-size: 15px; color: var(--label2); }
.spa-set-val {
  display: flex; align-items: center; gap: 6px;
  font-size: 15px; font-weight: 600; color: var(--label);
  font-variant-numeric: tabular-nums;
}
.spa-set-arrow { color: var(--label2); font-size: 14px; }
/* spa setpoint bottom sheet stepper */
.spa-sheet-val { font-size: 68px; font-weight: 700; color: var(--label); letter-spacing: -3px; line-height: 1; }
.spa-sheet-deg { font-size: 26px; color: var(--label2); font-weight: 400; }
.spa-sheet-steps { display: flex; justify-content: center; gap: 28px; margin: 20px 0 24px; }
.spa-sheet-step {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--fill); border: 1px solid rgba(255,255,255,.12);
  color: var(--label); font-size: 26px; font-weight: 300; line-height: 1;
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center;
}
.spa-sheet-step:active { transform: scale(.9); background: var(--track); }
.spa-sheet-step[disabled] { opacity: .4; cursor: default; }

/* pentair-style color swatch gallery */
.swatches {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
  gap: 12px; justify-items: center; margin-top: 12px; padding: 2px;
}
.swatch {
  width: var(--circle); height: var(--circle); border-radius: 50%;
  border: 2px solid rgba(255,255,255,.15); cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--label2);
  transition: transform .12s ease-out, box-shadow .2s ease-out, border-color .2s ease-out;
}
.swatch:active { transform: scale(.9); }
.swatch.on {
  border: 3px solid #fff;
  box-shadow: 0 0 12px rgba(255,255,255,.3);
}
.swatch svg { width: 22px; height: 22px; display: block; }
.swatch[disabled] { opacity: .5; cursor: default; }
.swatch.expander { position: relative; }
</style>

// Known mode/scene names → swatch color (for the modes color picker).
const MODE_COLORS = {
  blue: "#0a84ff",
  green: "#30d158",

  white: "#f2f2f7",

  off:       "rgba(255,255,255,0.06)",
  swim:      "linear-gradient(135deg,#0ea5e9,#14b8a6)",
  party:     "conic-gradient(#ef4444,#eab308,#22c55e,#3b82f6,#a855f7,#ef4444)",
  romantic:  "linear-gradient(135deg,#ec4899,#f59e0b)",
  caribbean: "linear-gradient(135deg,#06b6d4,#2dd4bf)",
  american:  "linear-gradient(135deg,#ef4444,#eff6ff,#3b82f6)",
  sunset:    "linear-gradient(135deg,#f97316,#dc2626)",
  royal:     "linear-gradient(135deg,#7c3aed,#3b82f6)",
  blue:      "#3b82f6",
  green:     "#22c55e",
  red:       "#ef4444",
  white:     "radial-gradient(circle,#ffffff,#cbd5e1)",
  purple:    "#a855f7",
};

// Pick an icon + accent color per control id/domain.
function iconFor(c) {
  const key = c.domain + ":" + c.id;
  const map = {
    "fans:fans": { i: FAN_SVG, c: "var(--cyan)" },
    "fans:lights": { i: BULB_SVG, c: "var(--amber)" },
    "fans:heaters": { i: HEAT_SVG, c: "var(--orange)" },
    "pool:spa": { i: SPA_SVG, c: "var(--orange)" },
    "pool:pool": { i: POOL_SVG, c: "var(--blue)" },
    "pool:lights": { i: BULB_SVG, c: "var(--amber)" },
    "pool:water_feature": { i: WATER_SVG, c: "var(--cyan)" },
    "pool:floor_cleaner": { i: BROOM_SVG, c: "var(--green)" },
    "pool:yard_light": { i: SUN_SVG, c: "var(--amber)" },
  };
  if (map[key]) return map[key];
  if (c.domain === "gate") return { i: c.status === "Locked" ? LOCK_SVG : UNLOCK_SVG, c: "var(--green)" };
  if (c.domain === "fans") return { i: FAN_SVG, c: "var(--cyan)" };
  return { i: BULB_SVG, c: "var(--amber)" };
}

// ── API helpers ────────────────────────────────────────────────
// Remote (silver-oauth) auth: when the gateway is behind the broker, API calls
// answer 401 {authRequired:true} until the user has signed in. Treat any 401 as
// "not signed in" and send the browser to the login endpoint (which 302s to the
// broker for Google sign-in, then back). On LAN auth is open, so this never fires.
function redirectToLogin() {
  window.location.href = "/api/auth/login";
}

// fetch wrapper that redirects to sign-in on a 401 instead of leaving the SPA
// on a blank page. Returns the Response on success; on 401 it kicks off the
// redirect and rejects so callers don't try to parse an unauthenticated body.
async function apiFetch(url, opts) {
  const res = await fetch(url, { credentials: "same-origin", ...(opts || {}) });
  if (res.status === 401) {
    redirectToLogin();
    throw new Error("not signed in");
  }
  return res;
}

async function postCommand(domain, id, payload) {
  try {
    const r = await fetch("/api/command", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ domain, id, payload }),
      credentials: "same-origin",
    });
    if (!r.ok) console.error("command failed", domain, id, payload, r.status);
    return r.ok;
  } catch (e) {
    console.error("command error", e);
    return false;
  }
}

// ── Control rows ───────────────────────────────────────────────
function ControlRow({ control, command, onHome, bare }) {
  const { i: iconNode, c: accent } = iconFor(control);
  const offline = !control.online;
  return (
    <div className={"ctl" + (control.on ? " on" : "") + (offline ? " offline" : "")}
         style={{ "--c": accent }}>
      <KindBody control={control} command={command} iconNode={iconNode} accent={accent} onHome={onHome} bare={bare} />
    </div>
  );
}

// Renders the icon + name + the kind-specific affordance.
function KindBody({ control, command, iconNode, onHome, bare }) {
  const k = control.kind;
  if (k === "toggle") return <ToggleRow control={control} command={command} iconNode={iconNode} />;
  if (k === "momentary") return <MomentaryRow control={control} command={command} iconNode={iconNode} />;
  if (k === "slider") return <SliderRow control={control} command={command} iconNode={iconNode} bare={bare} />;
  if (k === "speed") return <SpeedRow control={control} command={command} iconNode={iconNode} bare={bare} />;
  if (k === "modes") return <ModesRow control={control} command={command} iconNode={iconNode} bare={bare} />;
  if (k === "segmented") return <SegmentedRow control={control} command={command} iconNode={iconNode} />;
  if (k === "setpoint") return <SetpointRow control={control} command={command} iconNode={iconNode} />;
  if (k === "tristate") return <TristateRow control={control} command={command} iconNode={iconNode} bare={bare} />;
  return <ReadoutRow control={control} iconNode={iconNode} />;
}

function IconBtn({ control, iconNode, onClick, disabled }) {
  return (
    <button className="ctl-icon" onClick={onClick} disabled={disabled}
            aria-label={control.name + (control.on ? " on" : " off")}>
      {iconNode}
    </button>
  );
}

function NameSub({ control }) {
  return (
    <div className="ctl-main">
      <span className="ctl-name">{control.name}</span>
      {control.status ? <span className="ctl-sub">{control.status}</span> : null}
    </div>
  );
}

function OfflineBadge({ control }) {
  if (control.online) return null;
  return <span className="off-badge">offline</span>;
}

// Small, subtle card-level offline warning (Patio summary card): ⚠ + a short
// count like "1 fan offline" / "2 offline". Renders nothing when all online.
function OfflineWarning({ controls }) {
  const fansOffline = controls
    .filter((c) => c.id === "fans" || c.id === "lights")
    .reduce((m, c) => Math.max(m, c.offline || 0), 0);
  const heatersOffline = controls
    .filter((c) => c.id === "heaters")
    .reduce((m, c) => Math.max(m, c.offline || 0), 0);
  const total = fansOffline + heatersOffline;
  if (total <= 0) return null;
  let text;
  if (fansOffline > 0 && heatersOffline === 0) {
    text = fansOffline === 1 ? "1 fan offline" : fansOffline + " fans offline";
  } else if (heatersOffline > 0 && fansOffline === 0) {
    text = heatersOffline === 1 ? "1 heater offline" : heatersOffline + " heaters offline";
  } else {
    text = total + " offline";
  }
  return <div className="card-warn">⚠ {text}</div>;
}

function ToggleRow({ control, command, iconNode }) {
  const tap = () => command(control, { on: !control.on });
  return (
    <React.Fragment>
      <IconBtn control={control} iconNode={iconNode} onClick={tap} disabled={!control.online} />
      <NameSub control={control} />
      <div className="ctl-right"><OfflineBadge control={control} /></div>
    </React.Fragment>
  );
}

function MomentaryRow({ control, command, iconNode }) {
  const [busy, setBusy] = useState(false);
  const tap = async () => {
    if (busy || !control.online) return;
    setBusy(true);
    await command(control, { action: "unlock" });
    setTimeout(() => setBusy(false), 1500);
  };
  return (
    <React.Fragment>
      <IconBtn control={control} iconNode={iconNode} onClick={tap} disabled={!control.online} />
      <NameSub control={control} />
      <div className="ctl-right">
        <OfflineBadge control={control} />
        <button className="pill accent" onClick={tap} disabled={busy || !control.online}>
          {busy ? <span className="spin" /> : "Unlock"}
        </button>
      </div>
    </React.Fragment>
  );
}

function SliderRow({ control, command, iconNode, bare }) {
  const [min, max] = control.range || [1, 100];
  const baseVal = control.on ? (control.value ?? min) : 0;
  const [drag, setDrag] = useState(null);          // local drag value while sliding
  const timer = useRef(null);
  const val = drag != null ? drag : baseVal;
  const pct = max > min ? ((val - min) / (max - min)) * 100 : 0;
  const shownPct = control.on || drag != null ? pct : 0;

  const onInput = (e) => {
    const v = parseInt(e.target.value, 10);
    setDrag(v);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => {
      command(control, { value: v });
    }, 200);
  };
  const onCommit = () => {
    clearTimeout(timer.current);
    if (drag != null) command(control, { value: drag });
    setTimeout(() => setDrag(null), 250);          // let SSE catch up before releasing
  };
  const tapIcon = () => command(control, control.on ? { on: false } : { value: control.value ?? max });

  const sliderInput = (
    <input type="range" min={min} max={max} step="1" value={val}
           style={{ "--pct": shownPct + "%" }}
           aria-label={control.name}
           disabled={!control.online}
           onInput={onInput}
           onMouseUp={onCommit} onTouchEnd={onCommit} />
  );

  // Patio summary row (fans-app `comboDimmerRow` style): no name label, no count.
  // The icon toggles the lights group; OFF shows just the icon, ON shows icon +
  // brightness slider. Offline state is surfaced as a card-level warning instead.
  if (bare) {
    return (
      <React.Fragment>
        <IconBtn control={control} iconNode={iconNode} onClick={tapIcon} disabled={!control.online} />
        {control.on || drag != null
          ? <div style={{ flex: 1, minWidth: 0, display: "flex", alignItems: "center" }}>{sliderInput}</div>
          : <div className="ctl-spacer" />}
      </React.Fragment>
    );
  }

  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <IconBtn control={control} iconNode={iconNode} onClick={tapIcon} disabled={!control.online} />
        <NameSub control={control} />
        <div className="ctl-right"><OfflineBadge control={control} /></div>
      </div>
      <div className="slider-wrap">
        {sliderInput}
        <span className="slider-val">{control.on || drag != null ? val : ""}</span>
      </div>
    </div>
  );
}

function SpeedRow({ control, command, iconNode, bare }) {
  const [, max] = control.range || [1, 6];
  const tapIcon = () => command(control, { on: !control.on });
  const sub = control.on && control.value === null ? "Mixed" : control.status;

  const pills = [];
  for (let n = 1; n <= max; n++) {
    const active = control.on && control.value === n;
    pills.push(
      <button key={n} className={"spd" + (active ? " on" : "")}
              disabled={!control.online}
              onClick={() => command(control, { value: n })}>{n}</button>
    );
  }

  // Patio summary row (fans-app `comboFanRow` style): no name label, no count.
  // The icon toggles all fans; OFF shows just the icon, ON shows icon + speed
  // pills. Offline state is surfaced as a card-level warning, not per row.
  if (bare) {
    return (
      <React.Fragment>
        <IconBtn control={control} iconNode={iconNode} onClick={tapIcon} disabled={!control.online} />
        {control.on
          ? <div className="segc" style={{ flex: 1, minWidth: 0, marginTop: 0 }}>{pills}</div>
          : <div className="ctl-spacer" />}
      </React.Fragment>
    );
  }

  const affordance = control.on ? <div className="segc">{pills}</div> : null;

  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <IconBtn control={control} iconNode={iconNode} onClick={tapIcon} disabled={!control.online} />
        <div className="ctl-main">
          <span className="ctl-name">{control.name}</span>
          {sub ? <span className="ctl-sub">{sub}</span> : null}
        </div>
        <div className="ctl-right"><OfflineBadge control={control} /></div>
      </div>
      {affordance}
    </div>
  );
}

// Pool Light → a horizontally-scrollable gallery of pentair color swatches.
// `bare` omits the icon + name + status line (used inside section cards whose
// header already conveys the control's name + current mode).
function ModesRow({ control, command, iconNode, bare }) {
  const options = control.options || [];

  // State is now driven entirely by the already-merged `control` (App overlays
  // the central optimistic fields before this component sees it), so taps still
  // reflect instantly — just via the central layer, not a local override.
  const eff = { on: !!control.on, mode: control.mode };
  const mode = (eff.mode || "").toLowerCase();
  const subStatus = eff.on ? (eff.mode || control.status || "On") : "Off";

  // The palette rests COLLAPSED, showing the light's current state as a single
  // circle. Tapping it reveals the choices (no command). Selecting a color
  // springs back to the collapsed state ~1.5s after the last tap. (UI-only.)
  const [open, setOpen] = React.useState(false);
  const timer = React.useRef(null);
  React.useEffect(() => () => clearTimeout(timer.current), []);

  // Header icon toggles on/off (unchanged behavior for the non-bare layout).
  const tapIcon = () => command(control, { on: !control.on });

  // Apply a color: command is centrally optimistic, so the ring/collapsed swatch
  // move instantly. Restart the 1.5s spring-back timer.
  const pickColor = (name) => {
    command(control, { mode: name });
    clearTimeout(timer.current);
    timer.current = setTimeout(() => setOpen(false), 1500);
  };

  // Tap Off: command is centrally optimistic; collapse immediately.
  const pickOff = () => {
    command(control, { on: false });
    clearTimeout(timer.current);
    setOpen(false);
  };

  // Current-color tint for the collapsed swatch when the light is on.
  const tint = SWATCH_BG[mode] || "var(--amber)";

  // Extra breathing room above the palette (esp. below the Setpoint row in the
  // Spa card). The .swatches CSS default is 12px; bump it to ~19px.
  const swatchesStyle = { marginTop: 19 };

  // Dedicated "Off" swatch (power icon) shown FIRST in the expanded palette.
  // Active ring when the light is currently off.
  const offSwatch = (
    <button className={"swatch" + (!eff.on ? " on" : "")}
            style={{ background: SWATCH_BG.off, color: "var(--label2)" }}
            disabled={!control.online}
            aria-label="Off"
            onClick={pickOff}>
      {POWER_SVG}
    </button>
  );

  // Main circle: PURE expand/collapse toggle. Shows current state (current
  // color when on, dim bulb when off). It NEVER
  // sends a command — tapping only flips `open`.
  const expander = (
    <button className={"swatch expander" + (eff.on ? " on" : "") + (open ? " open" : "")}
            style={eff.on
              ? { background: tint, color: "#fff" }
              : { background: SWATCH_BG.off, color: "var(--label2)" }}
            disabled={!control.online}
            aria-label={open ? "Collapse" : "Expand"}
            aria-expanded={open}
            onClick={() => setOpen((o) => !o)}>
      {eff.on ? null : LIGHTBULB_SVG}
    </button>
  );

  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      {bare ? null : (
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <IconBtn control={control} iconNode={iconNode} onClick={tapIcon} disabled={!control.online} />
        <div className="ctl-main">
          <span className="ctl-name">{control.name}</span>
          {subStatus ? <span className="ctl-sub">{subStatus}</span> : null}
        </div>
        <div className="ctl-right"><OfflineBadge control={control} /></div>
      </div>
      )}
      <div className="swatches" style={swatchesStyle}>
        {/* Main circle is ALWAYS present: pure expand/collapse, shows state. */}
        {expander}
        {open ? (
          <React.Fragment>
            {/* Dedicated Off swatch FIRST, then the color swatches. */}
            {offSwatch}
            {options.map((name) => {
              const key = name.toLowerCase();
              const bg = SWATCH_BG[key] || "var(--track)";
              const active = eff.on && key === mode;
              return (
                <button key={name} className={"swatch" + (active ? " on" : "")}
                        style={{ background: bg }}
                        disabled={!control.online}
                        aria-label={name}
                        onClick={() => pickColor(name)} />
              );
            })}
          </React.Fragment>
        ) : null}
      </div>
    </div>
  );
}

// Spa: Off / Spa / Jets segmented pill control.
function SegmentedRow({ control, command, iconNode }) {
  const options = control.options || [];
  const mode = (control.mode || "").toLowerCase();
  const tapIcon = () => command(control, { on: !control.on });
  const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <IconBtn control={control} iconNode={iconNode} onClick={tapIcon} disabled={!control.online} />
        <div className="ctl-main">
          <span className="ctl-name">{control.name}</span>
          {control.status ? <span className="ctl-sub">{control.status}</span> : null}
        </div>
        <div className="ctl-right"><OfflineBadge control={control} /></div>
      </div>
      <div className="tri">
        {options.map((opt) => (
          <button key={opt} className={opt.toLowerCase() === mode ? "on" : ""}
                  disabled={!control.online}
                  onClick={() => command(control, { state: opt })}>{cap(opt)}</button>
        ))}
      </div>
    </div>
  );
}

// Spa Setpoint: inline -/+ stepper, debounced so holding doesn't flood.
function SetpointRow({ control, command, iconNode }) {
  const [min, max] = control.range || [40, 104];
  const clamp = (v) => Math.max(min, Math.min(max, v));
  const [local, setLocal] = useState(null);     // optimistic value while stepping
  const timer = useRef(null);
  const value = local != null ? local : (control.value ?? min);

  const step = (delta) => {
    const next = clamp(value + delta);
    if (next === value) return;
    setLocal(next);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => {
      command(control, { setpoint: next });
      setTimeout(() => setLocal(null), 250);    // let SSE catch up
    }, 250);
  };

  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <div className="ctl-icon" style={{ cursor: "default" }}>{iconNode}</div>
        <div className="ctl-main">
          <span className="ctl-name">{control.name || "Setpoint"}</span>
        </div>
        <div className="ctl-right">
          <OfflineBadge control={control} />
          <div className="stepper">
            <button className="step-btn" disabled={!control.online || value <= min}
                    aria-label="Decrease" onClick={() => step(-1)}>−</button>
            <span className="step-val">{value}°</span>
            <button className="step-btn" disabled={!control.online || value >= max}
                    aria-label="Increase" onClick={() => step(1)}>+</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// Gate: unifi-style Once / Until / Forever door control.
// `bare` omits the icon + name + status line (used inside the Gate summary
// card whose header + badge already convey the door's name + lock state).
function compactTime(s) {
  // "6:00 PM" -> "6p", "8:30 PM" -> "8:30p", "9:00 AM" -> "9a"
  if (!s) return s;
  const m = s.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
  if (!m) return s;
  const [, h, mm, ap] = m;
  const suf = ap.toUpperCase() === "PM" ? "p" : "a";
  return mm === "00" ? `${h}${suf}` : `${h}:${mm}${suf}`;
}

function TristateRow({ control, command, iconNode, bare }) {
  const [busy, setBusy] = useState(false);        // brief tap feedback for the Once pulse
  const [sheet, setSheet] = useState(false);
  const mode = control.mode || null;              // "forever" | "timed" | null

  const once = async () => {
    if (busy || !control.online) return;
    setBusy(true);
    await command(control, { action: "unlock" });
    setTimeout(() => setBusy(false), 1500);
  };
  const forever = () =>
    command(control, { action: mode === "forever" ? "stop" : "hold_forever" });
  const timed = () => {
    // Always open the time picker — even when a hold is already active — so the
    // user can re-pick (re-set) the end time after the fact. Clearing a hold is
    // handled by the "Turn off hold" button inside the sheet.
    setSheet(true);
  };

  // "Until" label: when held-today, show the end time from status
  // ("Held until 8:00 PM" → "Until 8:00 PM"); otherwise a sensible default.
  const untilLabel = mode === "timed" && control.status
    ? "Until " + compactTime(control.status.replace(/^Held until /i, ""))
    : "Until " + compactTime("6:00 PM");

  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      {bare ? null : (
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <IconBtn control={control} iconNode={iconNode} onClick={once} disabled={!control.online} />
        <div className="ctl-main">
          <span className="ctl-name">{control.name}</span>
          {control.status ? <span className="ctl-sub">{control.status}</span> : null}
        </div>
        <div className="ctl-right"><OfflineBadge control={control} /></div>
      </div>
      )}
      <div className="gate-actions" style={bare ? { marginTop: 0 } : undefined}>
        <button className={"gate-btn" + (busy ? " busy" : "")} disabled={!control.online}
                onClick={once}>{busy ? <span className="spin" /> : "Once"}</button>
        <button className={"gate-btn" + (mode === "timed" ? " held" : "")} disabled={!control.online}
                onClick={timed}>{untilLabel}</button>
        <button className={"gate-btn" + (mode === "forever" ? " held" : "")} disabled={!control.online}
                onClick={forever}>Forever</button>
      </div>
      {sheet ? (
        <GateHoldSheet control={control} command={command} mode={mode} onClose={() => setSheet(false)} />
      ) : null}
    </div>
  );
}

function ReadoutRow({ control, iconNode }) {
  return (
    <React.Fragment>
      <div className="ctl-icon" style={{ cursor: "default" }}>{iconNode}</div>
      <NameSub control={control} />
      <div className="ctl-right">
        {control.value != null ? <span className="card-status">{control.value}</span> : null}
      </div>
    </React.Fragment>
  );
}

// ── Gate hold-action sheet ─────────────────────────────────────
function GateHoldSheet({ control, command, mode, onClose }) {
  // Seed the picker from the current "Held until 6:00 PM" status when a timed
  // hold is active; otherwise default to 6:00 PM (18:00).
  const seed = () => {
    if (mode === "timed" && control.status) {
      const m = control.status.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
      if (m) {
        let h = parseInt(m[1], 10) % 12;
        if (m[3].toUpperCase() === "PM") h += 12;
        return String(h).padStart(2, "0") + ":" + m[2];
      }
    }
    return "18:00";
  };
  const [time, setTime] = useState(seed);
  const held = mode === "timed" || mode === "forever";
  const run = (payload) => { command(control, payload); onClose(); };
  return (
    <div className="ov" onClick={(e) => { if (e.target.classList.contains("ov")) onClose(); }}>
      <div className="sheet">
        <div className="sheet-title">{control.name}</div>
        <div className="sheet-sub">Hold open</div>
        <div className="sheet-row" style={{ justifyContent: "space-between", padding: "12px 14px" }}>
          <span style={{ fontWeight: 500 }}>Until time</span>
          <span style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <input className="sheet-input" type="time" value={time}
                   onChange={(e) => setTime(e.target.value)} style={{ width: 120 }} />
            <button className="pill accent"
                    onClick={() => run({ action: "hold_today", end_time: time })}>Set</button>
          </span>
        </div>
        <button className="sheet-row" onClick={() => run({ action: "hold_forever" })}>Forever</button>
        {held ? (
          <button className="sheet-row danger" onClick={() => run({ action: "stop" })}>Turn off hold</button>
        ) : null}
        <button className="sheet-row" onClick={onClose}>Cancel</button>
      </div>
    </div>
  );
}

// ── Spa setpoint bottom sheet ──────────────────────────────────
// Big setpoint value with −/+ steppers (±1, clamped to range) and
// Cancel / Set. "Set" sends {setpoint:n}; live value seeds it.
function SpaSetpointSheet({ control, command, onClose }) {
  const [min, max] = control.range || [40, 104];
  const clamp = (v) => Math.max(min, Math.min(max, v));
  const [val, setVal] = useState(clamp(control.value ?? min));
  const adj = (d) => setVal((v) => clamp(v + d));
  const set = () => { command(control, { setpoint: val }); onClose(); };
  return (
    <div className="ov" onClick={(e) => { if (e.target.classList.contains("ov")) onClose(); }}>
      <div className="sheet">
        <div className="sheet-title">Spa Temperature</div>
        <div style={{ textAlign: "center", margin: "8px 0 4px" }}>
          <span className="spa-sheet-val">{val}</span>
          <span className="spa-sheet-deg">°</span>
        </div>
        <div className="spa-sheet-steps">
          <button className="spa-sheet-step" disabled={val <= min}
                  aria-label="Decrease" onClick={() => adj(-1)}>−</button>
          <button className="spa-sheet-step" disabled={val >= max}
                  aria-label="Increase" onClick={() => adj(1)}>+</button>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button className="sheet-row" style={{ marginTop: 0 }} onClick={onClose}>Cancel</button>
          <button className="sheet-row" style={{ marginTop: 0, background: "rgba(45,212,191,.22)", color: "var(--teal)" }}
                  onClick={set}>Set</button>
        </div>
      </div>
    </div>
  );
}

// ── pentair-faithful Spa card ──────────────────────────────────
// Replicates the pentair spa card: status badge, big 52px temp, heat ETA,
// Off/Spa/Jets teal pills, tappable Setpoint → bottom sheet — and below it,
// inside the same card, the pool light color swatch gallery.
function SpaCard({ title, controls, command }) {
  const [sheet, setSheet] = useState(false);
  const byId = (id) => controls.find((c) => c.id === id);
  const spa = byId("spa") || controls.find((c) => c.kind === "segmented");
  const setpoint = byId("spa_setpoint") || controls.find((c) => c.kind === "setpoint");
  const lights = byId("lights") || controls.find((c) => c.kind === "modes");

  // Status badge from the spa control.
  const status = (spa && spa.status) || "";
  const mode = (spa && (spa.mode || "").toLowerCase()) || "off";
  let badge;
  if (/heat/i.test(status)) badge = { text: "Heating", tone: "orange" };
  else if (!spa || mode === "off" || !spa.on) badge = { text: "Off", tone: "gray" };
  else badge = { text: "On", tone: "teal" };

  // Big temperature (spa.value); ETA part of status when heating ("… · ETA").
  const temp = spa && spa.value != null ? spa.value : null;
  const heating = /heat/i.test(status);
  const eta = heating && status.indexOf("· ") !== -1
    ? status.slice(status.indexOf("· ") + 2)
    : "";

  const segOpts = (spa && spa.options) || ["off", "spa", "jets"];
  const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
  const spaOnline = !spa || spa.online;

  const spVal = setpoint && setpoint.value != null ? setpoint.value : null;

  return (
    <div className="card">
      <div className="card-title-row">
        <div className="card-title">{title}</div>
        <span className={"badge " + badge.tone}>{badge.text}</span>
      </div>

      <div className="spa-temp-row">
        <span className="spa-temp-val">
          {temp != null ? temp : "--"}<span className="spa-temp-deg">°</span>
        </span>
      </div>
      {eta ? <div className="spa-heat-info">{eta}</div> : null}

      <div className="spa-seg">
        {segOpts.map((opt) => {
          const key = opt.toLowerCase();
          return (
            <button key={opt} className={"spa-seg-btn" + (key === mode ? " active" : "")}
                    disabled={!spaOnline}
                    onClick={() => command(spa, { state: key })}>{cap(key)}</button>
          );
        })}
      </div>

      {setpoint ? (
        <div className="spa-set-row" onClick={() => setpoint.online && setSheet(true)}>
          <span className="spa-set-label">Setpoint</span>
          <span className="spa-set-val">
            {spVal != null ? spVal + "°F" : "--°F"} <span className="spa-set-arrow">›</span>
          </span>
        </div>
      ) : null}

      {lights ? (
        <ModesRow control={lights} command={command} bare />
      ) : null}

      {sheet && setpoint ? (
        <SpaSetpointSheet control={setpoint} command={command} onClose={() => setSheet(false)} />
      ) : null}
    </div>
  );
}

// ── Cards ──────────────────────────────────────────────────────
const DOMAIN_TITLE = { gate: "Gate", pool: "Pool", fans: "Fans" };

// Derive a small status badge ({ text, tone }) for a section card from its
// primary control. `controls` are the LIVE controls for this section.
// tone ∈ { green, teal, orange, gray }.
function sectionBadge(title, controls) {
  const byKind = (k) => controls.find((c) => c.kind === k);
  const t = (title || "").toLowerCase();

  // Gate → the door/momentary/tristate control's status.
  if (t.indexOf("gate") !== -1) {
    const door = byKind("tristate") || byKind("momentary") ||
                 controls.find((c) => c.domain === "gate");
    if (!door) return null;
    const status = door.status || "";
    // Wording is now "Closed"/"Open"/"Held…": Closed → green, Open/Held → amber.
    let tone = "orange";
    if (/closed/i.test(status) || /lock/i.test(status)) tone = "green";
    return status ? { text: status, tone } : null;
  }

  // (Spa + Pool Light render as a custom SpaCard, which computes its own badge.)

  // Fans → optional All Fans status (e.g. "2 of 4").
  if (t.indexOf("fan") !== -1) {
    const f = byKind("speed") || controls.find((c) => c.id === "fans");
    if (f && f.status) return { text: f.status, tone: f.on ? "teal" : "gray" };
    return null;
  }

  return null;
}

// One pentair-style card per configured section.
function SectionCard({ title, controls, command }) {
  const tl = (title || "").toLowerCase();

  // Spa → fully custom pentair-faithful card (temp + Off/Spa/Jets + setpoint
  // sheet + merged light gallery). Triggered by the "Spa" title or a pool:spa
  // control in the section.
  const isSpaCard = tl.indexOf("spa") !== -1 ||
    controls.some((c) => c.domain === "pool" && c.id === "spa");
  if (isSpaCard) {
    return <SpaCard title={title} controls={controls} command={command} />;
  }

  const badge = sectionBadge(title, controls);
  // In the Gate summary card the header (title) + badge (lock state) already
  // convey name + status, so a lone gate door renders bare (buttons only).
  const isGateCard = tl.indexOf("gate") !== -1;
  const singleTristate = controls.length === 1 && controls[0].kind === "tristate";

  // Patio summary card → label-less fans-app home rows (icon + control + a small
  // group-status indicator, no "Fans"/"Lights" name). Only the speed (fans) and
  // slider (lights) controls take the bare path; the per-domain Fans tab keeps names.
  const isPatioCard = tl.indexOf("patio") !== -1;

  const rows = controls.map((c) => {
    const bareGate = isGateCard && singleTristate && c.kind === "tristate";
    const barePatio = isPatioCard && (c.kind === "speed" || c.kind === "slider");
    return (
      <ControlRow key={c.domain + ":" + c.id} control={c} command={command} onHome bare={bareGate || barePatio} />
    );
  });

  return (
    <div className="card">
      <div className="card-title-row">
        <div className="card-title">{title}</div>
        {badge ? <span className={"badge " + badge.tone}>{badge.text}</span> : null}
      </div>
      {rows.length ? rows : <div className="card-status">No controls.</div>}
      {isPatioCard ? <OfflineWarning controls={controls} /> : null}
    </div>
  );
}

function HomeSections({ sections, byKey, command, mergeFn }) {
  if (!sections.length) {
    return <div className="card"><div className="card-status">No home controls configured.</div></div>;
  }
  return (
    <React.Fragment>
      {sections.map((sec, si) => {
        // Live controls (SSE, already optimistic-merged via byKey) by domain+id;
        // fall back to the /api/home snapshot (merged here for early taps).
        const controls = sec.ids
          .map((k) => byKey[k.domain + ":" + k.id] || mergeFn(sec.snapshot[k.domain + ":" + k.id]))
          .filter(Boolean);
        return (
          <SectionCard key={"sec-" + si + ":" + sec.title}
                       title={sec.title} controls={controls} command={command} />
        );
      })}
    </React.Fragment>
  );
}

function DomainCard({ tab, controls, command }) {
  const rows = controls.map((c) =>
    <ControlRow key={c.domain + ":" + c.id} control={c} command={command} />
  );
  return (
    <div className="card">
      <div className="card-title-row">
        <div className="card-title">{DOMAIN_TITLE[tab] || tab}</div>
      </div>
      {rows.length ? rows : <div className="card-status">No controls.</div>}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────
const TABS = [
  { id: "home", label: "Home" },
  { id: "gate", label: "Gate" },
  { id: "pool", label: "Pool" },
  { id: "fans", label: "Patio" },
];

// Pure prediction of the partial control fields a payload SHOULD produce,
// keyed by control.kind. Returns {} when there's nothing persistent to predict
// (e.g. a momentary "unlock" pulse). Used by the central optimistic layer.
function predict(control, payload) {
  if (!control || !payload) return {};
  switch (control.kind) {
    case "toggle":
      return { on: !!payload.on };
    case "segmented":
      return { mode: payload.state, on: payload.state !== "off" };
    case "setpoint":
      return { value: payload.setpoint };
    case "speed":
      return "value" in payload
        ? { value: payload.value, on: true }
        : { on: !!payload.on };
    case "slider":
      return "value" in payload
        ? { value: payload.value, on: true }
        : { on: !!payload.on };
    case "modes":
      if ("mode" in payload) return { mode: payload.mode, on: true };
      if ("on" in payload) return { on: !!payload.on };
      return {};
    case "momentary":
    case "tristate":
      if (payload.action === "hold_forever") return { on: true, mode: "forever" };
      if (payload.action === "hold_today") return { on: true, mode: "timed" };
      if (payload.action === "stop") return { on: false, mode: null };
      if (payload.action === "unlock") return {};   // momentary pulse, nothing to persist
      return {};
    default:
      return {};
  }
}

// True when the live control already reflects ALL predicted fields (mode
// compared case-insensitively, null == null). Used to retire optimistic entries.
function matchesPrediction(control, fields) {
  if (!control) return false;
  for (const k in fields) {
    const want = fields[k];
    const got = control[k];
    if (k === "mode") {
      const a = want == null ? null : String(want).toLowerCase();
      const b = got == null ? null : String(got).toLowerCase();
      if (a !== b) return false;
    } else if (k === "on") {
      if (!!want !== !!got) return false;
    } else {
      if (want !== got) return false;
    }
  }
  return true;
}

function App() {
  const [state, setState] = useState({ controls: [] });
  const [sections, setSections] = useState([]);    // [{title, ids:[{domain,id}], snapshot:{key->control}}]
  const [tab, setTab] = useState("home");
  const [connected, setConnected] = useState(false);
  const draggingRef = useRef(false);
  // Central optimistic overlay: key "domain:id" -> { fields:{...predicted...} }.
  // A tap reflects instantly via these fields; SSE reconciliation (or a 6s
  // safety timer) clears each entry.
  const [optimistic, setOptimistic] = useState({});
  const optimisticTimers = useRef({});             // key -> timeout id
  // Auth gate. "checking" until /api/auth/me resolves; "ok" once we know we may
  // load (LAN open, or remote + signed in). On remote-not-signed-in we redirect
  // to sign-in and stay "checking" (the browser navigates away). Until "ok" we
  // never start the data fetches / SSE, and we render a minimal Loading shell
  // instead of a blank page.
  const [authState, setAuthState] = useState("checking");

  // On mount, resolve the auth challenge before doing anything else.
  // - {authRequired:false}                  → LAN, open → proceed.
  // - {authRequired:true, email:"…"}         → remote, signed in → proceed.
  // - {authRequired:true} without an email   → remote, NOT signed in → redirect.
  // - 401 (handled by apiFetch)              → NOT signed in → redirect.
  useEffect(() => {
    apiFetch("/api/auth/me")
      .then((r) => r.json())
      .then((d) => {
        if (d && d.authRequired && !d.email) {
          redirectToLogin();
          return;
        }
        setAuthState("ok");
      })
      .catch(() => { /* 401 already triggered redirect; stay on Loading */ });
  }, []);

  // Initial paint + learn the Home section structure (titles + control ids/order).
  // Gated on authState === "ok" so we never fetch (and surface a confusing 401)
  // before the auth challenge is resolved.
  useEffect(() => {
    if (authState !== "ok") return;
    apiFetch("/api/state")
      .then((r) => r.json()).then((d) => setState(d)).catch(() => {});
    apiFetch("/api/home")
      .then((r) => r.json())
      .then((d) => {
        // New shape: {sections:[{title, controls:[...]}]}. Fall back to the old
        // flat {controls:[...]} shape by grouping into a single section.
        let secs = d.sections;
        if (!secs) {
          secs = (d.controls && d.controls.length) ? [{ title: "Home", controls: d.controls }] : [];
        }
        setSections(secs.map((s) => {
          const ctrls = s.controls || [];
          const snapshot = {};
          ctrls.forEach((c) => { snapshot[c.domain + ":" + c.id] = c; });
          return {
            title: s.title,
            ids: ctrls.map((c) => ({ domain: c.domain, id: c.id })),
            snapshot,
          };
        }));
      })
      .catch(() => {});
  }, [authState]);

  // Live SSE stream. Also gated on auth; if the stream errors while the document
  // is no longer authenticated (e.g. session expired → 401 on the SSE endpoint),
  // a follow-up /api/state probe surfaces the 401 and redirects to sign-in rather
  // than silently flipping the connection dot off forever.
  useEffect(() => {
    if (authState !== "ok") return;
    const es = new EventSource("/api/stream");
    es.onopen = () => setConnected(true);
    es.onmessage = (ev) => {
      try {
        const d = JSON.parse(ev.data);
        if (d && d.controls) { setConnected(true); setState(d); }
      } catch (e) { /* ignore malformed frame */ }
    };
    es.onerror = () => {
      setConnected(false);   // EventSource auto-reconnects on transient errors
      // EventSource can't read the HTTP status, so probe a normal endpoint:
      // a 401 there means our session is gone → apiFetch redirects to sign-in.
      apiFetch("/api/state").catch(() => {});
    };
    return () => es.close();
  }, [authState]);

  // Clear any pending optimistic safety timers on unmount.
  useEffect(() => () => {
    Object.values(optimisticTimers.current).forEach(clearTimeout);
  }, []);

  const command = useCallback((control, payload) => {
    if (control) {
      const key = control.domain + ":" + control.id;
      const fields = predict(control, payload);
      if (fields && Object.keys(fields).length) {
        setOptimistic((o) => ({ ...o, [key]: { fields } }));
        clearTimeout(optimisticTimers.current[key]);
        optimisticTimers.current[key] = setTimeout(() => {
          setOptimistic((o) => {
            if (!(key in o)) return o;
            const next = { ...o };
            delete next[key];
            return next;
          });
          delete optimisticTimers.current[key];
        }, 6000);
      }
      postCommand(control.domain, control.id, payload);
    }
  }, []);

  // Reconcile on each SSE snapshot: drop optimistic entries the live state now
  // satisfies (and cancel their safety timers).
  useEffect(() => {
    setOptimistic((o) => {
      let changed = false;
      const next = { ...o };
      for (const key in o) {
        const live = byKey[key];
        if (live && matchesPrediction(live, o[key].fields)) {
          clearTimeout(optimisticTimers.current[key]);
          delete optimisticTimers.current[key];
          delete next[key];
          changed = true;
        }
      }
      return changed ? next : o;
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [state]);

  // Merge optimistic overlay onto a live control.
  const merge = (c) => {
    if (!c) return c;
    const ov = optimistic[c.domain + ":" + c.id];
    return ov ? { ...c, ...ov.fields } : c;
  };

  // byKey holds the MERGED controls so both home sections and domain tabs see
  // the optimistic overlay.
  const byKey = {};
  (state.controls || []).forEach((c) => {
    byKey[c.domain + ":" + c.id] = merge(c);
  });

  // While the auth check is in flight (or while a sign-in redirect is taking
  // effect) render a minimal centered "Loading…" so the page is never blank.
  if (authState !== "ok") {
    return (
      <div className="app" style={{ display: "flex", alignItems: "center",
           justifyContent: "center", minHeight: "60vh" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10,
             color: "var(--label2)", fontSize: 15 }}>
          <span className="spin" /> Loading…
        </div>
      </div>
    );
  }

  let body;
  if (tab === "home") {
    body = <HomeSections sections={sections} byKey={byKey} command={command} mergeFn={merge} />;
  } else {
    const domainControls = (state.controls || [])
      .filter((c) => c.domain === tab)
      .filter((c) => !(c.domain === "gate" && c.id === "gate"))
      .map(merge);
    body = <DomainCard tab={tab} controls={domainControls} command={command} />;
  }

  return (
    <div className="app">
      <div className="hdr">
        <div className="seg">
          {TABS.map((t) => (
            <button key={t.id} className={t.id === tab ? "active" : ""}
                    onClick={() => setTab(t.id)}>{t.label}</button>
          ))}
        </div>
        <div className="hdr-right">
          <div className={"conn-dot" + (connected ? "" : " off")}
               title={connected ? "Connected" : "Reconnecting…"} />
        </div>
      </div>
      {body}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
}
</script>
</body>
</html>
